<!DOCTYPE html>
<html>
    <body>
        <h2>What Can JavaScript Do?</h2>
        <p id="demo">Hello World</p>
        <button type="button" onclick="changeText()">Change text</button>
        <button type="button" onclick="hideElement()">Hide</button>
        <button type="button" onclick="getElementById('demo').style.display='block'">Show</button>
    </body>
        
    <script src="hideScript.js"></script>
        
    <script>
        // comment
        /* comment */
        function changeText() {
            document.getElementById("demo").innerHTML = "Hello JavaScript"
        } 
    </script>
</html>




<!-- JavaScript can "display" data in different ways:
Writing into an HTML element, using innerHTML.
Writing into the HTML output using document.write().
Writing into an alert box, using window.alert().
Writing into the browser console, using console.log().
 -->
